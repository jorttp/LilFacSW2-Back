_format_version: "3.0"

services:
  - name: lilfac-service
    url: http://host.docker.internal:8081
    routes:
      - name: workers-route
        paths:
          - /api/v1/workers
        methods:
          - POST
          - GET
          - PUT
          - DELETE
        strip_path: false

      - name: verification-route
        paths:
          - /api/v1/verification
        methods:
          - POST
          - OPTIONS
        strip_path: false

      - name: parametros-route
        paths:
          - /api/v1/parametros
        methods:
          - GET
          - OPTIONS
        strip_path: false

  - name: keycloak-service
    url: http://host.docker.internal:8090
    routes:
      - name: keycloak-route
        paths:
          - /realms
          - /resources
        methods:
          - GET
          - POST
          - OPTIONS
        strip_path: false

  - name: frontend-service
    url: http://host.docker.internal:3001
    routes:
      - name: frontend-route
        paths:
          - /
        methods:
          - GET
        strip_path: false